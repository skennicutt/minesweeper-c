# ─────────────────────────────────────────────────────────────────────────────
# Game Release Pipeline
#
# Stages
#   1. build      – CMake build + test on Windows, Linux, macOS  (always)
#   2. sign       – Code-sign Windows (.pfx) and macOS (.app)    (tags only)
#   3. deploy     – Push to Steam, GOG, and itch.io              (tags only)
#
# Trigger
#   • Pull requests / pushes to main  →  build + test only
#   • Version tags  v*.*.*            →  full pipeline
#
# Required GitHub Secrets
#   Windows signing:
#     WINDOWS_CERTIFICATE        base64-encoded .pfx
#     WINDOWS_CERTIFICATE_PWD    password for the .pfx
#
#   macOS signing & notarization:
#     MACOS_CERTIFICATE               base64-encoded Developer ID .p12
#     MACOS_CERTIFICATE_PWD           password for the .p12
#     MACOS_KEYCHAIN_PWD              any random string (temp keychain)
#     MACOS_DEVELOPER_NAME            "Your Name" (as registered with Apple)
#     MACOS_NOTARIZATION_TEAM_ID      your Apple Developer Team ID
#     MACOS_NOTARIZATION_APPLE_ID     your Apple ID email
#     MACOS_NOTARIZATION_PWD          app-specific password for notarytool
#
#   Steam:
#     STEAM_USERNAME        build-account username (dedicated account recommended)
#     STEAM_CONFIG_VDF      base64-encoded config.vdf from a logged-in SteamCMD session
#
#   GOG:
#     GOG_CLIENT_ID         GOG Galaxy pipeline client ID
#     GOG_CLIENT_SECRET     GOG Galaxy pipeline client secret
#
#   itch.io:
#     BUTLER_CREDENTIALS    butler API key  (https://itch.io/user/settings/api-keys)
#
# Required GitHub Variables  (Settings → Variables, not Secrets)
#     STEAM_APP_ID          your Steam App ID
#     GOG_GAME_ID           your GOG product ID
#     ITCH_USER             your itch.io username
#     ITCH_GAME             your itch.io game slug
# ─────────────────────────────────────────────────────────────────────────────

name: Game Release Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  GAME_NAME: minesweeper-c
  BUILD_TYPE: Release

# Cancel in-progress runs for the same ref so PRs don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 1 – Build
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            platform: linux
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            platform: macos
            c_compiler: clang
            cpp_compiler: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL3 build dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libegl-dev libgles2-mesa-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          -DCMAKE_INSTALL_PREFIX=dist
          -S .

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Install to staging directory
        run: cmake --install build --config ${{ env.BUILD_TYPE }}

      # Unsigned artifacts – consumed by the sign jobs (or directly by deploy for Linux)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-${{ matrix.platform }}-unsigned
          path: dist/
          retention-days: 7

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 2a – Sign (Windows)
# ═════════════════════════════════════════════════════════════════════════════
  sign-windows:
    name: Sign / Windows
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download unsigned Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows-unsigned
          path: dist/

      # signtool.exe ships with the Windows SDK; find the latest installed copy
      - name: Sign executables
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}")
          $certPath  = "$env:TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Filter signtool.exe -Recurse |
                      Sort-Object LastWriteTime -Descending |
                      Select-Object -First 1 -ExpandProperty FullName

          Get-ChildItem dist -Filter *.exe -Recurse | ForEach-Object {
            & $signtool sign `
              /fd SHA256 `
              /f $certPath `
              /p "${{ secrets.WINDOWS_CERTIFICATE_PWD }}" `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              $_.FullName
          }
          Remove-Item $certPath

      - name: Upload signed Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: dist/
          retention-days: 7

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 2b – Sign & Notarize (macOS)
# ═════════════════════════════════════════════════════════════════════════════
  sign-macos:
    name: Sign / macOS
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download unsigned macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-macos-unsigned
          path: dist/

      # Import the Developer ID certificate into a temporary keychain so
      # codesign can find it without touching the login keychain
      - name: Import signing certificate
        run: |
          echo "${{ secrets.MACOS_CERTIFICATE }}" | base64 --decode > certificate.p12
          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PWD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain  -p "${{ secrets.MACOS_KEYCHAIN_PWD }}" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "${{ secrets.MACOS_CERTIFICATE_PWD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${{ secrets.MACOS_KEYCHAIN_PWD }}" build.keychain
          rm certificate.p12

      # --options runtime is required for notarization (hardened runtime)
      - name: Sign app bundle
        run: |
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application: ${{ secrets.MACOS_DEVELOPER_NAME }} (${{ secrets.MACOS_NOTARIZATION_TEAM_ID }})" \
            --options runtime \
            "dist/${{ env.GAME_NAME }}.app"

      # Submit for notarization; --wait blocks until Apple responds (~1–5 min)
      - name: Notarize app bundle
        run: |
          ditto -c -k --keepParent \
            "dist/${{ env.GAME_NAME }}.app" \
            "dist/${{ env.GAME_NAME }}-notarize.zip"

          xcrun notarytool submit "dist/${{ env.GAME_NAME }}-notarize.zip" \
            --apple-id  "${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}" \
            --team-id   "${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}" \
            --password  "${{ secrets.MACOS_NOTARIZATION_PWD }}" \
            --wait

          # Staple the ticket so the app passes Gatekeeper offline
          xcrun stapler staple "dist/${{ env.GAME_NAME }}.app"
          rm "dist/${{ env.GAME_NAME }}-notarize.zip"

      # Package as a distributable DMG (required by GoG / itch for macOS)
      - name: Package as DMG
        run: |
          hdiutil create \
            -volname   "${{ env.GAME_NAME }}" \
            -srcfolder "dist/${{ env.GAME_NAME }}.app" \
            -ov -format UDZO \
            "dist/${{ env.GAME_NAME }}.dmg"

      - name: Upload signed macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-macos
          path: dist/
          retention-days: 7

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 3 – Deploy (all three stores run in parallel after signing)
#
# sign-windows and sign-macos both depend on `build`, so by the time either
# sign job completes, all three platform builds have already succeeded and
# their artifacts are available.
# ═════════════════════════════════════════════════════════════════════════════

  # ── Steam ──────────────────────────────────────────────────────────────────
  # Expects steam/ VDF files in the repo:
  #   steam/app_build.vdf       top-level app build config
  #   steam/depot_windows.vdf   Windows depot (points to artifacts/windows/)
  #   steam/depot_linux.vdf     Linux depot   (points to artifacts/linux/)
  #   steam/depot_macos.vdf     macOS depot   (points to artifacts/macos/)
  # See: https://partner.steamgames.com/doc/sdk/uploading
  # ───────────────────────────────────────────────────────────────────────────
  deploy-steam:
    name: Deploy / Steam
    needs: [sign-windows, sign-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: steam-release   # optional: require manual approval in GitHub

    steps:
      - name: Checkout (for VDF configs)
        uses: actions/checkout@v4

      - name: Download Windows artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: artifacts/windows/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-linux-unsigned
          path: artifacts/linux/

      - name: Download macOS artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-macos
          path: artifacts/macos/

      - name: Deploy to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username:         ${{ secrets.STEAM_USERNAME }}
          configVdf:        ${{ secrets.STEAM_CONFIG_VDF }}
          appId:            ${{ vars.STEAM_APP_ID }}
          buildDescription: ${{ github.ref_name }}
          rootPath:         artifacts
          depot1Path:       windows
          depot2Path:       linux
          depot3Path:       macos
          releaseBranch:    beta    # promote to default manually via Steamworks

  # ── GOG ────────────────────────────────────────────────────────────────────
  # Uses the GOG Galaxy Build Tools CLI (pipeline-builder).
  # Expects a pipeline config at gog/pipeline.json in the repo.
  # See: https://docs.gog.com/bc-build-tools/
  # ───────────────────────────────────────────────────────────────────────────
  deploy-gog:
    name: Deploy / GOG
    needs: [sign-windows, sign-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: gog-release

    steps:
      - name: Checkout (for GOG pipeline config)
        uses: actions/checkout@v4

      - name: Download Windows artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: artifacts/windows/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-linux-unsigned
          path: artifacts/linux/

      - name: Download macOS artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-macos
          path: artifacts/macos/

      - name: Install GOG Galaxy Build Tools
        run: |
          curl -fsSL \
            "https://cdn.gog.com/open/galaxy/pipeline-tools/prod/linux/pipeline-builder_linux.zip" \
            -o pipeline-builder.zip
          unzip -q pipeline-builder.zip -d gog-tools
          chmod +x gog-tools/pipeline-builder

      - name: Deploy to GOG
        env:
          GOG_CLIENT_ID:     ${{ secrets.GOG_CLIENT_ID }}
          GOG_CLIENT_SECRET: ${{ secrets.GOG_CLIENT_SECRET }}
          GOG_GAME_ID:       ${{ vars.GOG_GAME_ID }}
          RELEASE_VERSION:   ${{ github.ref_name }}
        run: |
          # Substitute the version and artifact paths into the pipeline config,
          # then publish. The pipeline.json references artifacts/ relative paths.
          gog-tools/pipeline-builder \
            --username   "$GOG_CLIENT_ID" \
            --password   "$GOG_CLIENT_SECRET" \
            --version    "$RELEASE_VERSION" \
            publish gog/pipeline.json

  # ── itch.io ────────────────────────────────────────────────────────────────
  # Uses butler, itch.io's official upload CLI.
  # Channel names follow the pattern <os>[-arch], e.g. windows, linux-x86_64.
  # See: https://itch.io/docs/butler/pushing.html
  # ───────────────────────────────────────────────────────────────────────────
  deploy-itch:
    name: Deploy / itch.io
    needs: [sign-windows, sign-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: itch-release

    steps:
      - name: Download Windows artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: artifacts/windows/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-linux-unsigned
          path: artifacts/linux/

      - name: Download macOS artifact (signed)
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-macos
          path: artifacts/macos/

      - name: Install butler
        uses: itch-io/setup-butler@latest

      - name: Push Windows build
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          butler push artifacts/windows/ \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:windows" \
            --userversion "${{ github.ref_name }}"

      - name: Push Linux build
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          butler push artifacts/linux/ \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:linux-x86-64" \
            --userversion "${{ github.ref_name }}"

      - name: Push macOS build
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          butler push artifacts/macos/ \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:osx-universal" \
            --userversion "${{ github.ref_name }}"
